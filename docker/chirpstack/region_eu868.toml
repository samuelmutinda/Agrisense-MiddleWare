[[regions]]

  [regions.gateway]

    [regions.gateway.backend]

      [regions.gateway.backend.mqtt]
        event_topic = "eu868/gateway/+/event/+"
        state_topic = "eu868/gateway/+/state/+"
        command_topic_template = "eu868/gateway/{{ .GatewayID }}/command/{{ .CommandType }}"

  [regions.network]
    installation_margin = 10
    rx1_delay = 1
    rx1_dr_offset = 0
    rx2_dr = 0
    rx2_frequency = 869525000
    rx2_prefer_on_rx1_dr_lt = 0
    rx2_prefer_on_link_budget = false
    downlink_tx_power = -1
    adr_disabled = false
    min_dr = 0
    max_dr = 5

  [[regions.network.extra_channels]]

  [regions.network.class_b]
    ping_slot_dr = 0
    ping_slot_frequency = 868100000

  [regions.network.rejoin_request]
    enabled = false
    max_count_n = 0
    max_time_n = 0

  name = "eu868"
  common_name = "EU868"
  user_info = ""
